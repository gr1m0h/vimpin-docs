# osv-scanner ignore list
#
# Every entry below is a build-time / dev-server transitive dependency of
# Docusaurus. None of them ship in the generated static site (the output of
# `docusaurus build` is plain HTML/CSS/JS), so the advisories are not
# reachable by site visitors. They also cannot be bumped in isolation:
# Docusaurus pins these versions through its own dependency tree, and forcing
# newer majors breaks the build (e.g. js-yaml 4 removes the `safeLoad` API
# that gray-matter relies on).
#
# Real remediation is tracked by Renovate, which opens PRs as Docusaurus
# releases versions with the fixed transitive deps. Drop the matching entry
# here once the lockfile no longer resolves the vulnerable version.

[[IgnoredVulns]]
