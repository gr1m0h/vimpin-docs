# <target-repo>/.github/workflows/security.yml
name: security
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  npm-audit:
    uses: gr1m0h/.github/.github/workflows/npm-audit.yml@bfd9d34d379bce643b84d63b33abc6c6bc13227a
    # Node toolchains (e.g. Docusaurus) pull deep build-time dependency
    # trees where high-severity advisories with no upstream fix are common
    # and not reachable in the shipped output. Gate on `critical` so the
    # security check stays actionable instead of perpetually red.
    with:
      audit-level: critical
  osv-scan:
    uses: gr1m0h/.github/.github/workflows/osv-scanner.yml@bfd9d34d379bce643b84d63b33abc6c6bc13227a
    permissions:
      contents: read
      security-events: write
  gitleaks:
    uses: gr1m0h/.github/.github/workflows/gitleaks.yml@bfd9d34d379bce643b84d63b33abc6c6bc13227a
  dependency-review:
    if: github.event_name == 'pull_request'
    uses: gr1m0h/.github/.github/workflows/dependency-review.yml@bfd9d34d379bce643b84d63b33abc6c6bc13227a
    permissions:
      contents: read
      pull-requests: write
  codeql:
    uses: gr1m0h/.github/.github/workflows/codeql-typescript.yml@bfd9d34d379bce643b84d63b33abc6c6bc13227a
    permissions:
      contents: read
      security-events: write
      actions: read
  actionlint:
    uses: gr1m0h/.github/.github/workflows/actions-pin-lint.yml@bfd9d34d379bce643b84d63b33abc6c6bc13227a
